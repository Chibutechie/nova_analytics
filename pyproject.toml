[tool.pytest.ini_options]
testpaths = ["pipeline/tests"]
pythonpath = ["pipeline"]

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "pandas",
    "sqlalchemy",
    "pyarrow",
    "dotenv"
]
ignore_missing_imports = true

[tool.pyright]
extraPaths = ["pipeline"]
