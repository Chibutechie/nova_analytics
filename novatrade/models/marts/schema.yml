version: 2

models:
  - name: fct_customer_revenue
    description: "Mart table aggregating revenue and transaction metrics at the customer level"
    columns:
      - name: customer_id
        description: "Primary key for the customer"
        data_tests:
          - unique
          - not_null
      - name: customer_value_tier
        description: "Tier classification based on total revenue"
        data_tests:
          - not_null
          - accepted_values:
              values: ['Platinum', 'Gold', 'Silver', 'Bronze', 'Prospect']
      - name: total_transactions
        description: "Total number of transactions made by the customer"
        data_tests:
          - not_null
      - name: revenue_net
        description: "Total net revenue generated by the customer"
        data_tests:
          - not_null

  - name: fct_discount_impact
    description: "Mart table analyzing the impact of discounts by year, month, region, category, and discount band"
    columns:
      - name: order_year
        data_tests: [not_null]
      - name: order_month
        data_tests: [not_null]
      - name: region
        data_tests: [not_null]
      - name: category
        data_tests: [not_null]
      - name: discount_band
        description: "Categorical band indicating the depth of discount"
        data_tests:
          - not_null
          - accepted_values:
              values: ['No Discount', 'Low', 'Moderate', 'Heavy']
      - name: total_transactions
        data_tests: [not_null]

  - name: fct_returns
    description: "Mart table isolating returned transactions"
    columns:
      - name: transaction_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null
      - name: revenue_lost
        description: "Net revenue lost due to the return"
        data_tests: [not_null]

  - name: fct_revenue
    description: "Mart table detailing individual sales transactions"
    columns:
      - name: transaction_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null
      - name: is_return
        description: "Boolean flag indicating if the transaction was returned"
        data_tests: [not_null]

  - name: fct_revenue_monthly
    description: "Mart table aggregating revenue and transaction metrics by month, region, and category"
    columns:
      - name: order_year
        data_tests: [not_null]
      - name: order_month
        data_tests: [not_null]
      - name: region
        data_tests: [not_null]
      - name: category
        data_tests: [not_null]
      - name: revenue_net
        description: "Monthly net revenue"
        data_tests: [not_null]
