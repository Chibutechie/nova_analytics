version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests: [unique, not_null]
  - name: stg_products
    columns:
      - name: product_id
        data_tests: [unique, not_null]
  - name: stg_sales
    columns:
      - name: transaction_id
        data_tests: [unique, not_null]
      - name: customer_id
        data_tests: 
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        data_tests: 
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: store_id
        data_tests: 
          - not_null
          - relationships:
              to: ref('stg_stores')
              field: store_id
  - name: stg_stores
    columns:
      - name: store_id
        data_tests: [unique, not_null]
